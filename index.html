<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выбор варианта</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 700px;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
}

.subtitle {
    opacity: 0.6;
    margin-bottom: 30px;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 15px;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(124,58,237,0.4), transparent);
    opacity: 0;
    transition: 0.5s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-6px) scale(1.03);
    box-shadow: 0 10px 40px rgba(124,58,237,0.5);
}

.card img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
}

.btn {
    display: block;
    margin-top: 10px;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    background: linear-gradient(135deg, #7c3aed, #9333ea);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(147,51,234,0.7);
}

/* 📱 Мобилка */
@media (max-width: 600px) {
    .cards {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 22px;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>Выберите вариант</h1>
    <div class="subtitle">Нажмите, чтобы перейти</div>

    <div class="cards">

        <!-- Карточка 1 -->
        <div class="card">
            <img src="kush.png" alt="">
            <a href="https://link1.com" class="btn">Перейти</a>
        </div>

        <!-- Карточка 2 -->
        <div class="card">
            <img src="eva.jpg" alt="">
            <a href="https://link2.com" class="btn">Перейти</a>
        </div>

    </div>
</div>

</body>
</html>
