<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доступ к игре</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    padding: 20px;
    width: 100%;
    max-width: 700px;
}

h1 {
    font-size: 28px;
    margin-bottom: 10px;
    color: gold;
    text-shadow: 0 0 20px gold;
}

.subtitle {
    margin-bottom: 20px;
    opacity: 0.8;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.card {
    display: block;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 12px;
    transition: 0.3s;
    border: 1px solid rgba(255,215,0,0.2);
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 25px rgba(255,215,0,0.4);
}

/* 🔥 ВОТ ГЛАВНЫЙ ФИКС КАРТИНОК */
.card img {
    width: 100%;
    max-height: 240px;
    object-fit: contain;
    border-radius: 12px;
    background: black;
}

.btn {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    background: linear-gradient(135deg, gold, orange);
    color: black;
    font-weight: bold;
}

/* 📱 мобилка */
@media (max-width: 600px) {
    body {
        align-items: flex-start;
    }

    .cards {
        grid-template-columns: 1fr;
    }

    h1 {
        font-size: 22px;
    }

    .card img {
        max-height: 200px;
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>🎰 ДОСТУП К ИГРЕ</h1>
    <div class="subtitle">Выберите вариант и получите бонус</div>

    <div class="cards">

        <!-- Карточка 1 -->
        <a href="https://pl4y-zn-ksh.com/d02qrx9yt" class="card">
            <img src="kush.png">
            <div class="btn">ИГРАТЬ</div>
        </a>

        <!-- Карточка 2 -->
        <a href="https://bal-ancer-eva.com/da6ee6iad" class="card">
            <img src="eva.jpg">
            <div class="btn">ПОЛУЧИТЬ БОНУС</div>
        </a>

    </div>
</div>

</body>
</html>
